name: Java CI with Maven

# 1. Kích hoạt workflow khi có push hoặc pull request vào nhánh main/master
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # Sử dụng máy ảo Ubuntu mới nhất của GitHub
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Kéo (Checkout) mã nguồn của bạn về máy ảo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Bước 2: Cài đặt môi trường Java (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # Tự động cache thư viện Maven để build nhanh hơn ở các lần sau

      # Bước 3: Thực thi vòng đời Build và Test của Maven
      # Lệnh 'package' sẽ tự động chạy qua các pha: validate -> compile -> test -> package
      - name: Build and Test with Maven
        run: mvn -B clean package --file pom.xml

      # Bước 4: Lưu trữ tệp .jar vừa được tạo ra
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathutils-executable-jar
          # Đường dẫn tìm tệp .jar trong thư mục target sau khi build xong
          path: target/*.jar
          # Xóa artifact sau 14 ngày để tiết kiệm dung lượng
          retention-days: 14